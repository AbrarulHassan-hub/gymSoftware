<div class="member-directory">

  <div class="dir-header">
    <h2 class="dir-title">Member Directory</h2>
    <div class="dir-actions">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search members..." />
      </div>
      <button class="btn-add" (click)="toggleModal(true)">＋ Add Member</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" /></th>
          <th>Member</th>
          <th>ID</th>
          <th>Membership Plan</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (m of memberdata; track m.Id) {
          <tr>
            <td><input type="checkbox" /></td>
            <td>
              <div class="member-cell">
                <span>{{ m.Code }}</span>
              </div>
            </td>
            <td class="muted">{{ m.Name }}</td>
            <td class="muted">{{ m.PhoneNo }}</td>
            <td class="muted">{{ m.StartDate }}</td>
            <td class="muted">{{ m.Status ? "Active": "InActive" }}</td>
            <td class="dots">⋮</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  @if (showModal) {
    <div class="modal-overlay">
      <div class="modal-card">
        <div class="modal-header">
          <h3>ADD NEW MEMBER</h3>
          <span class="close-x" (click)="toggleModal(false)">&times;</span>
        </div>

        <form class="member-form" (submit)="$event.preventDefault()">
          <div class="f-group">
            <label>Code</label>
            <input type="text" [(ngModel)]="memberForm.Code" name="Code" placeholder="Enter Code">
          </div>
          <div class="f-group">
            <label>Full Name</label>
            <input type="text" [(ngModel)]="memberForm.Name" name="Name" placeholder="Enter name">
          </div>
          <div class="f-group">
            <label>Membership Type</label>
            <select [(ngModel)] = "memberForm.PlanId" name="PlanId">
              <option value="0">select Membership Plan</option>
              @for (item of membershipPlans; track item.id) {
                <option [value]="item.id">{{item.name}}</option>
              }
            </select>
          </div>
          <div class="f-group">
            <label>Phone Number</label>
            <input type="text" [(ngModel)] = "memberForm.PhoneNo" name="PhoneNo" placeholder="03xx xxxxxxx">
          </div>
          
          <div class="f-group">
            <label>Start Date</label>
            <input type="date" [(ngModel)] = "memberForm.StartDate" name="StartDate">
          </div>
          <div class="f-group">
      <label>Status</label>
  <input type="checkbox" [(ngModel)]="memberForm.Status" name="Status"  name="Status">
      </div>
          
          <div class="modal-footer">
            <button type="submit" class="btn-save">Save Member</button>
            <button type="button" class="btn-cancel" (click)="toggleModal(false)">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  }

</div>
